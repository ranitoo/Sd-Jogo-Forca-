<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login - MercaKing</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		.button {
			background-color: #28a745; /* Verde escuro */
			border: none;
			color: white;
			padding: 15px 32px;
			text-align: center;
			text-decoration: none;
			display: inline-block;
			font-size: 16px;
			margin: 4px 2px;
			cursor: pointer;
			border-radius: 12px;
		}
	</style>
</head>
<body>
<section class="h-100">
	<div class="container h-100">
		<div class="row justify-content-sm-center h-100">
			<div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
				<div class="text-center my-5">
				</div>
				<div class="card shadow-lg">
					<div class="card-body p-5">
						<h1 class="fs-4 card-title fw-bold mb-4">Login</h1>
						<form method="post" th:action="@{/login}" class="needs-validation" novalidate autocomplete="off">
							<div class="mb-3">
								<label class="mb-2 text-muted" for="email">Endereço de E-Mail</label>
								<input id="email" type="email" class="form-control" name="email" required autofocus>
								<div class="invalid-feedback">
									Email não é válido
								</div>
							</div>

							<div class="mb-3">
								<label class="mb-2 text-muted" for="password">Password</label>
								<input id="password" type="password" class="form-control" name="password" required>
								<div class="invalid-feedback">
									Password obrigatória
								</div>
							</div>

							<div class="d-flex align-items-center">
								<button type="submit" class="button ms-auto">Login</button>
							</div>
						</form>
					</div>
					<div class="card-footer py-3 border-0">
						<div class="text-center">
							Não tem uma conta? <a th:href="@{/}" class="text-success">Voltar ao início</a>
						</div>
					</div>
				</div>
				<div class="text-center mt-5 text-muted">
					© 2026 - MercaKing
				</div>
			</div>
		</div>
	</div>
</section>
</body>
</html>
