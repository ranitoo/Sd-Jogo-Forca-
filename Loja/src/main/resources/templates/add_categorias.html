<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Categoria</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background-color: #28a745;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }

        footer {
            background-color: #343a40;
            color: white;
            padding: 1rem;
            text-align: center;
            margin-top: 3rem;
        }

        h2 {
            color: #343a40;
            margin-bottom: 1.5rem;
        }

        .btn-success-custom {
            background-color: #66bb6a;
            border-color: #66bb6a;
			color: white;
        }

        .btn-success-custom:hover {
            background-color: #57a05b;
            border-color: #57a05b;
        }
    </style>
</head>
<body>

<header>
    <h1>MercaDito</h1>
    <p>Gestão de Categorias</p>
</header>

<div class="container mt-5">
    <h2>Inserir Categoria</h2>
    <form th:action="@{/admin/novacategoria}" method="post" th:object="${categoria}">
        <div class="form-group">
            <label>Nome:</label>
            <input type="text" th:field="*{nome}" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-success-custom">Adicionar Categoria</button>
    </form>
</div>

<footer>
    <p>&copy; 2025 MercaDito. Todos os direitos reservados.</p>
</footer>

</body>
</html>
